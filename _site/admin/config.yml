local_backend: true

backend:
  name: github
  repo: alexrussell159/russell-digital
  branch: main

media_folder: "public_html/assets/blog"
public_folder: "/assets/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "public_html/src/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    extension: "md"
    format: "frontmatter"
    preview_path: "blog/{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Author", name: "author", widget: "hidden", default: "Alex Russell" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Updated Date", name: "updated", widget: "datetime", required: false }

      - label: "Tags"
        name: "tags"
        widget: "hidden"
        default:
          - blog
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }